name: AccuVest Morning Briefing

on:
  workflow_dispatch: 
    # 加入這個設定，讓妳可以在 GitHub 網頁上手動點擊按鈕進行測試

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest # 使用最新的 Linux 虛擬機

    steps:
      - name: 📥 檢索程式碼 (Checkout Code)
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 快取套件，讓未來的執行速度更快

      - name: 📦 安裝依賴套件 (Install Requirements)
        run: |
          python -m pip install --upgrade pip
          
          pip install requests pandas google-genai fredapi

      - name: 📡 步驟一：資料獲取層 (Data Ingestion)
        env:
          # 將存放在 GitHub Secrets 的金鑰注入虛擬環境
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python data_ingestion.py

      - name: 🧠 步驟二：核心大腦層 (Strategy Brain)
        # 大腦層只讀取本地 JSON，不需要外部金鑰
        run: python strategy_brain.py

      - name: 📢 步驟三：轉譯與推播層 (Notification Layer)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        run: python notification_layer.py
