name: AccuVest Morning Briefing

on:
  # 💡 移除原本的 schedule (cron)，完全依賴 workflow_dispatch
  # 這樣 cron-job.org 才能透過 API 精準觸發，而且妳也能手動按鈕測試
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest # 使用最新的 Linux 虛擬機

    steps:
      - name: 📥 檢索程式碼 (Checkout Code)
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 確保與妳本地測試版本一致
          cache: 'pip'

      - name: 📦 安裝依賴套件 (Install Requirements)
        run: |
          python -m pip install --upgrade pip
          # 💡 改用 requirements.txt 一次裝好，更符合工程規範
          pip install -r requirements.txt
          pip list

      # ==========================================
      # 💡 導入企業級容錯：交接聯絡簿機制 (Cache)
      # ==========================================
      - name: 📅 取得今日日期 (作為聯絡簿密碼)
        id: date
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: 🔍 檢查今日成功打卡單
        id: cache
        uses: actions/cache@v3
        with:
          path: success.flag
          key: accuvest-success-${{ env.TODAY }}

      # ==========================================
      # 💡 只有在「沒有打卡單」時才執行核心運算
      # ==========================================
      - name: 🚀 啟動系統並產出打卡單
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          # 將所有存放在 GitHub Secrets 的金鑰一次注入
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        run: |
          echo "📡 開始執行資料獲取層..."
          python data_ingestion.py
          
          echo "🧠 開始執行核心大腦層 (總經決策)..."
          python strategy_brain.py
          
          echo "🎯 開始執行 ETF 嚴選層 (規模/流動性/動能決策)..."
          python etf_selector.py
          
          echo "📢 開始執行轉譯與推播層..."
          python notification_layer.py
          
          # 若以上四行都順利跑完，代表今天任務圓滿達成，建立成功標記
          touch success.flag
          echo "✅ 系統執行完畢，已建立成功打卡單 (success.flag)"

      # ==========================================
      # 💡 如果找到打卡單，就安靜地跳過
      # ==========================================
      - name: ⏭️ 略過執行通知
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "⏭️ 今天早上已經成功推播過了，跳過中午的降級備用排程。"
