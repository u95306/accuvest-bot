name: AccuVest Daily Morning Briefing

on:
  schedule:
    # 使用 Cron 語法：分 時 日 月 星期
    # UTC 00:30 = 台灣時間 08:30
    - cron: '55 8 * * *'
  
  # 這個設定讓你可以隨時在 GitHub 網頁上手動點擊 "Run workflow" 測試
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下載程式碼 (Checkout)
        uses: actions/checkout@v4
        
      - name: 2. 建立 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 3. 安裝依賴套件 (Requirements)
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas google-genai
          
      - name: 4. 執行推播主程式
        env:
          # 將 GitHub Secrets 裡的鑰匙，注入到虛擬機的環境變數中
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        run: python main.py
