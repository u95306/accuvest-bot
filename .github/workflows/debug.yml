name: API 診斷測試 (Debug)

on:
  workflow_dispatch: # 只允許手動觸發，不設定定時排程

jobs:
  run-diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 檢索程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安裝 Requests 套件
        # 這次我們連 requirements.txt 都不讀，只裝最單純的 requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🩺 執行 API 診斷程式
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python debug.py
